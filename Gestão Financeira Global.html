<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão Financeira Global - Master</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; margin: 20px; color: #333; }
        .container { max-width: 1150px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .year-selector { background: #f8f9fa; color: #2c3e50; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; border: 1px solid #ddd; }
        .year-selector select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; font-weight: bold; cursor: pointer; }

        .import-panel { background: #e8f5e9; border: 1px solid #81c784; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .btn-import { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-import:hover { background: #1b5e20; }

        .toolbar { margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        button.tool { padding: 8px 15px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; color: #444; background: #fff; font-weight: 500; font-size: 13px; transition: all 0.2s; }
        button.tool:hover { background: #f1f2f6; border-color: #999; }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 15px; }
        .tab-btn { padding: 8px 12px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 4px; flex: 1; transition: 0.2s; }
        .tab-btn.active { background: #2c3e50; color: white; font-weight: bold; border: none; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        /* AJUSTE: Cursor de ponteiro nos headers para indicar que são clicáveis */
        th { background: #f1f2f6; padding: 10px; font-size: 13px; text-align: left; color: #666; cursor: pointer; user-select: none; }
        th:hover { background: #e2e8f0; }
        
        td { border-bottom: 1px solid #eee; padding: 0; position: relative; vertical-align: middle; }
        input { width: 100%; border: none; outline: none; padding: 10px; box-sizing: border-box; background: transparent; font-size: 14px; }
        input:focus { background: #f0f7ff; border: 1px solid #3498db; }
        
        .desc-input { text-transform: uppercase; }
        .input-val { text-align: right; }
        .status-cell { text-align: right; font-weight: bold; padding-right: 10px; background: #fafafa; width: 140px; font-size: 14px; }
        
        .action-cell { text-align: center; display: flex; justify-content: center; align-items: center; gap: 8px; height: 100%; min-height: 40px; padding: 0 !important; }
        th.action-cell-header { text-align: center; cursor: default; }
        th.action-cell-header:hover { background: #f1f2f6; }
        
        .btn-row-add, .btn-row-del { border: none; background: none; font-size: 18px; cursor: pointer; font-weight: bold; line-height: 1; padding: 0; margin: 0; }
        .btn-row-add { color: #3498db; }
        .btn-row-del { color: #e74c3c; }

        .footer-totals { background: #f8f9fa; padding: 15px; border-radius: 0 0 12px 12px; border: 1px solid #ddd; border-top: none; display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
        .row-info { display: flex; justify-content: space-between; align-items: center; }
        .total-final { border-top: 2px solid #2c3e50; margin-top: 5px; padding-top: 8px; font-size: 16px; font-weight: 900; }
        
        .aviso-saida { color: #e67e22; font-weight: bold; position: absolute; right: 2px; top: 10px; pointer-events: none; }

        #fileInput { display: none; }

       @media print {
    body { background: white; margin: 0; padding: 0; zoom: 80%; }
    .container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
    
    /* Adicionei .action-cell e .action-cell-header aqui para sumir a coluna toda */
    .year-selector, .import-panel, .toolbar, .tabs, #fileInput, .action-cell, .action-cell-header { 
        display: none !important; 
    }
    
    table { border: 1px solid #ccc; width: 100%; }
    th { border: 1px solid #ccc; background: #eee !important; color: black; -webkit-print-color-adjust: exact; }
    td { border: 1px solid #eee; }
    .aviso-saida { color: black !important; }
}
    </style>
</head>
<body>

<div class="container">
    <h2 id="tituloPagina">💰 Gestão Financeira Global</h2>

    <div class="year-selector">
        <label>Ano:</label>
        <select id="selectAno" onchange="changeYear()"></select>
    </div>

    <div class="import-panel">
        <strong>📂 Importação por Mês (Banco)</strong><br>
        <small>Extraindo dados para: <b id="mesAlvoTxt">...</b></small><br>
        <input type="file" id="fileExtrato" accept=".txt,.csv" style="margin-top: 10px;">
        <button class="btn-import" onclick="importarArquivoBanco()">🚀 Importar este Mês</button>
    </div>

    <div class="toolbar">
        <button class="tool" onclick="saveData()">💾 Salvar</button>
        <button class="tool" onclick="copyPreviousMonth()">📋 Copiar Anterior (Projeção)</button>
        <button class="tool" onclick="ordenarPorDia()">📅 Ordenar por Dia</button>
        <button class="tool" onclick="limparMesInteiro()">🧹 Limpar Mês</button>
        <button class="tool" onclick="exportBackup()">📥 Backup</button>
        <button class="tool" onclick="document.getElementById('fileInput').click()">📤 Restaurar</button>
        <button class="tool" onclick="window.print()">📄 Imprimir</button>
        <input type="file" id="fileInput" onchange="importBackup(event)" accept=".txt">
    </div>

    <div class="tabs" id="tabContainer"></div>

    <div id="tableContainer">
        <table>
            <thead>
                <tr>
                    <th width="50" onclick="ordenarPorCampo('d')">Dia 🔃</th>
                    <th width="250" onclick="ordenarPorCampo('desc')">Descrição 🔃</th>
                    <th width="130" style="text-align:right" onclick="ordenarPorCampo('e')">Entrada 🔃</th>
                    <th width="130" style="text-align:right" onclick="ordenarPorCampo('s')">Saída 🔃</th>
                    <th width="140" style="text-align:right">Saldo Acum.</th>
                    <th width="70" class="action-cell-header">Ações</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        
        <div class="footer-totals">
            <div class="row-info" style="color: #555;">
                <span>Saldo Anterior (Mêses passados):</span>
                <span id="valorMesAnterior">R$ 0,00</span>
            </div>
            <div class="row-info" style="color: #27ae60;">
                <span>(+) Entradas deste Mês:</span>
                <span id="totalEntradasMes">R$ 0,00</span>
            </div>
            <div class="row-info" style="color: #c0392b;">
                <span>(-) Saídas deste Mês:</span>
                <span id="totalSaidasMes">R$ 0,00</span>
            </div>
            <div class="row-info total-final">
                <span>Saldo Final em Conta:</span>
                <span id="saldoFinalReal">R$ 0,00</span>
            </div>
        </div>
    </div>
</div>

<script>
    const months = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    let lastMonth = localStorage.getItem('lastActiveMonth');
    let currentYear = new Date().getFullYear();
    let currentMonth = lastMonth || months[new Date().getMonth()];
    let fullDB = JSON.parse(localStorage.getItem('financeDB_v2')) || {};
    let sortOrders = { d: 1, desc: 1, e: 1, s: 1 }; // Controle de direção da ordenação

    function format(v) { return v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
    function saveDataSilent() { localStorage.setItem('financeDB_v2', JSON.stringify(fullDB)); }
    function saveData() { saveDataSilent(); alert("✔️ Dados salvos!"); }

    function init() {
        const sel = document.getElementById('selectAno');
        for(let y=2024; y<=2050; y++){
            let opt = document.createElement('option');
            opt.value = y; opt.innerText = y;
            if(y === parseInt(currentYear)) opt.selected = true;
            sel.appendChild(opt);
        }
        checkAndCreateYear(currentYear);
        renderTabs();
        renderTable();
        atualizarTextoFiltro();
    }

    // AJUSTE PONTUAL: Função de ordenação genérica
    function ordenarPorCampo(campo) {
        let dados = fullDB[currentYear][currentMonth].filter(r => r.d || r.desc || r.e || r.s);
        const ordem = sortOrders[campo];

        dados.sort((a, b) => {
            let valA = a[campo] || (campo === 'desc' ? '' : 0);
            let valB = b[campo] || (campo === 'desc' ? '' : 0);

            if (campo === 'd' || campo === 'e' || campo === 's') {
                return (parseFloat(valA) - parseFloat(valB)) * ordem;
            } else {
                return valA.toString().localeCompare(valB.toString()) * ordem;
            }
        });

        sortOrders[campo] *= -1; // Inverte para o próximo clique
        while(dados.length < 15) dados.push({d:'', desc:'', e:'', s:''});
        fullDB[currentYear][currentMonth] = dados;
        saveDataSilent();
        renderTable();
    }

    function checkAndCreateYear(year) {
        if(!fullDB[year]) fullDB[year] = {};
        months.forEach(m => {
            if(!fullDB[year][m]) fullDB[year][m] = Array(15).fill().map(() => ({d:'', desc:'', e:'', s:''}));
        });
    }

    function atualizarTextoFiltro() {
        const txt = document.getElementById('mesAlvoTxt');
        if(txt) txt.innerText = currentMonth + "/" + currentYear;
        document.getElementById('tituloPagina').innerText = `💰 Gestão Financeira - ${currentMonth}/${currentYear}`;
    }

    function getSaldoAnterior(ano, mesNome) {
        const mesIdx = months.indexOf(mesNome);
        let saldo = 0;
        for (let i = 0; i < mesIdx; i++) {
            const m = months[i];
            (fullDB[ano][m] || []).forEach(l => {
                saldo += parseFloat(l.e || 0);
                saldo -= parseFloat(l.s || 0);
            });
        }
        return saldo;
    }

    function renderTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        fullDB[currentYear][currentMonth].forEach((row, i) => {
            const aviso = parseFloat(row.s) >= 1000 ? '<span class="aviso-saida">⚠️</span>' : '';
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" value="${row.d || ''}" oninput="update(${i}, 'd', this.value)"></td>
                <td><input type="text" class="desc-input" value="${row.desc || ''}" oninput="update(${i}, 'desc', this.value)"></td>
                <td><input type="number" step="0.01" class="input-val" value="${row.e || ''}" oninput="update(${i}, 'e', this.value)"></td>
                <td style="display:flex; align-items:center;">
                    <input type="number" step="0.01" class="input-val" value="${row.s || ''}" oninput="update(${i}, 's', this.value)">
                    ${aviso}
                </td>
                <td class="status-cell"></td>
                <td class="action-cell">
                    <button class="btn-row-add" onclick="addLinha(${i})">+</button>
                    <button class="btn-row-del" onclick="delLinha(${i})">×</button>
                </td>
            `;
            body.appendChild(tr);
        });
        recalculate();
    }

    function recalculate() {
        const saldoAnterior = getSaldoAnterior(currentYear, currentMonth);
        document.getElementById('valorMesAnterior').innerText = "R$ " + format(saldoAnterior);
        let acumulado = saldoAnterior;
        let totalEntradas = 0;
        let totalSaidas = 0;
        const rows = document.querySelectorAll('#tableBody tr');
        fullDB[currentYear][currentMonth].forEach((data, i) => {
            const e = parseFloat(data.e || 0);
            const s = parseFloat(data.s || 0);
            totalEntradas += e;
            totalSaidas += s;
            acumulado += (e - s);
            const cell = rows[i].querySelector('.status-cell');
            const temDado = data.d || data.desc || data.e || data.s;
            cell.innerText = temDado ? format(acumulado) : '';
            cell.style.color = acumulado >= 0 ? "#27ae60" : "#c0392b";
        });
        document.getElementById('totalEntradasMes').innerText = "R$ " + format(totalEntradas);
        document.getElementById('totalSaidasMes').innerText = "R$ " + format(totalSaidas);
        document.getElementById('saldoFinalReal').innerText = "R$ " + format(acumulado);
        document.getElementById('saldoFinalReal').style.color = acumulado >= 0 ? '#27ae60' : '#c0392b';
    }

    function update(i, field, val) {
        if (field === 'desc') val = val.toUpperCase();
        fullDB[currentYear][currentMonth][i][field] = val;
        saveDataSilent();
        if(field === 's') renderTable();
        else recalculate();
    }

    function addLinha(index) {
        fullDB[currentYear][currentMonth].splice(index + 1, 0, {d:'', desc:'', e:'', s:''});
        saveDataSilent();
        renderTable();
    }

    function delLinha(i) {
        fullDB[currentYear][currentMonth].splice(i, 1);
        if(fullDB[currentYear][currentMonth].length < 5) fullDB[currentYear][currentMonth].push({d:'', desc:'', e:'', s:''});
        saveDataSilent();
        renderTable();
    }

    function ordenarPorDia() {
        ordenarPorCampo('d');
    }

    function limparMesInteiro() {
        if(confirm("Deseja apagar todos os dados deste mês?")) {
            fullDB[currentYear][currentMonth] = Array(15).fill().map(() => ({d:'', desc:'', e:'', s:''}));
            saveDataSilent();
            renderTable();
        }
    }

    function changeYear() {
        currentYear = document.getElementById('selectAno').value;
        checkAndCreateYear(currentYear);
        renderTable();
        atualizarTextoFiltro();
    }

    function renderTabs() {
        const cont = document.getElementById('tabContainer');
        cont.innerHTML = '';
        months.forEach(m => {
            const b = document.createElement('button');
            b.className = `tab-btn ${m === currentMonth ? 'active' : ''}`;
            b.innerText = m;
            b.onclick = () => { 
                currentMonth = m; 
                localStorage.setItem('lastActiveMonth', m);
                renderTabs(); renderTable(); atualizarTextoFiltro();
            };
            cont.appendChild(b);
        });
    }

    function copyPreviousMonth() {
        const idx = months.indexOf(currentMonth);
        if (idx > 0 && confirm(`Copiar projeção de ${months[idx-1]} para ${currentMonth}?`)) {
            fullDB[currentYear][currentMonth] = JSON.parse(JSON.stringify(fullDB[currentYear][months[idx-1]]));
            saveDataSilent();
            renderTable();
        }
    }

    function exportBackup() {
        const agora = new Date();
        const ano = agora.getFullYear();
        const mes = String(agora.getMonth() + 1).padStart(2, '0');
        const dia = String(agora.getDate()).padStart(2, '0');
        const hora = String(agora.getHours()).padStart(2, '0');
        const min = String(agora.getMinutes()).padStart(2, '0');
        const nomeArquivo = `Gestão_Financeira_${ano}_${dia}-${mes}-${ano}_${hora}h${min}.txt`;
        const blob = new Blob([JSON.stringify(fullDB)], {type: 'text/plain'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = nomeArquivo; a.click();
    }


    function importBackup(event) {
        const reader = new FileReader();
        reader.onload = (e) => { 
            fullDB = JSON.parse(e.target.result); 
            saveDataSilent();
            renderTable(); 
            alert("Backup restaurado!");
        };
        reader.readAsText(event.target.files[0]);
    }

    function importarArquivoBanco() {
        const fileInput = document.getElementById('fileExtrato');
        if (!fileInput.files[0]) return alert("Selecione um arquivo!");
        const reader = new FileReader();
        const mesAtualIdx = months.indexOf(currentMonth) + 1;
        reader.onload = function(e) {
            const linhas = e.target.result.split('\n');
            let novos = [];
            linhas.forEach(linha => {
                const regData = /(\d{2})\/(\d{2})/;
                const regVal = /(-?\s?\d+[\d\.,]*,\d{2})/;
                const dMatch = linha.match(regData);
                const vMatch = linha.match(regVal);
                if (dMatch && vMatch && parseInt(dMatch[2]) === mesAtualIdx) {
                    let v = parseFloat(vMatch[0].replace(/\s/g, '').replace('.', '').replace(',', '.'));
                    let desc = linha.replace(regData, '').replace(regVal, '').replace(/[\t\s;]+/g, ' ').trim();
                    desc = desc.replace(/^\/\d{4}/, '').replace(/^[\/\s]+/, '').trim();
                    novos.push({ d: dMatch[1], desc: desc.toUpperCase(), e: v > 0 ? v.toString() : "", s: v < 0 ? Math.abs(v).toString() : "" });
                }
            });
            if (novos.length > 0) {
                fullDB[currentYear][currentMonth] = [...fullDB[currentYear][currentMonth].filter(r => r.d || r.desc || r.e || r.s), ...novos];
                saveDataSilent();
                ordenarPorDia();
                alert("Importado!");
            } else { alert("Nenhum dado deste mês encontrado."); }
        };
        reader.readAsText(fileInput.files[0], 'ISO-8859-1');
    }

    init();
</script>
</body>
</html>

    </template>

                <div class="text-[8px] font-bold text-slate-400 uppercase whitespace-nowrap">Status do Mercado</div>
                <div id="status-text" class="flex items-center justify-end gap-1">
                    <span id="status-dot" class="h-2 w-2 rounded-full bg-orange-500 shrink-0"></span>
                    <span id="label-fonte" class="font-bold text-[8px] uppercase tracking-tighter whitespace-nowrap">BANCO CENTRAL (...)</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-[1200px] mx-auto">
        <div class="flex gap-2 mb-4">
            <button onclick="buscarDadosPublicos()" class="bg-blue-600 text-white px-4 py-2 rounded text-[10px] font-bold uppercase hover:bg-blue-700 transition"><i class="fa-solid fa-rotate mr-2"></i>Sincronizar</button>
            <button onclick="exportarDados()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded text-[10px] font-bold uppercase hover:bg-slate-300">Backup</button>
            <button onclick="document.getElementById('inputImport').click()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded text-[10px] font-bold uppercase hover:bg-slate-300">Importar</button>
            <button onclick="window.print()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded text-[10px] font-bold uppercase hover:bg-slate-300"><i class="fa-solid fa-print mr-2"></i>Imprimir</button>
            <input type="file" id="inputImport" class="hidden" accept=".json" onchange="importarDados(event)">
        </div>

        <div class="card overflow-hidden">
            <div class="invest-row header-row">
                <div></div><div>Ativo</div><div>Valor / Quantia</div><div>Data Início</div><div>Aporte Mensal</div><div class="text-right">Total Líquido (BRL)</div>
            </div>
            
            <div id="portfolio-list">
                <div class="invest-row">
                    <div class="h-full bg-blue-500"></div>
                    <div class="font-bold">Master DI (100% CDI)</div>
                    <input type="number" id="v-master" placeholder="R$" oninput="salvarTudo()">
                    <input type="date" id="d-master" oninput="salvarTudo()">
                    <input type="number" id="a-master" placeholder="Aporte R$" oninput="salvarTudo()">
                    <div id="res-total-master" class="text-right font-black mono res-preto text-sm">R$ 0,00</div>
                </div>
                <div class="invest-row">
                    <div class="h-full bg-red-500"></div>
                    <div class="font-bold">Fundo Mapfre</div>
                    <input type="number" id="v-mapfre" placeholder="R$" oninput="salvarTudo()">
                    <input type="date" id="d-mapfre" oninput="salvarTudo()">
                    <input type="number" id="a-mapfre" placeholder="Aporte R$" oninput="salvarTudo()">
                    <div id="res-total-mapfre" class="text-right font-black mono res-preto text-sm">R$ 0,00</div>
                </div>
                <div class="invest-row">
                    <div class="h-full bg-indigo-500"></div>
                    <div class="font-bold">Previdência</div>
                    <input type="number" id="v-prev" placeholder="R$" oninput="salvarTudo()">
                    <input type="date" id="d-prev" oninput="salvarTudo()">
                    <input type="number" id="a-prev" placeholder="Aporte R$" oninput="salvarTudo()">
                    <div id="res-total-prev" class="text-right font-black mono res-preto text-sm">R$ 0,00</div>
                </div>
                <div class="invest-row">
                    <div class="h-full bg-emerald-500"></div>
                    <div class="font-bold">Tesouro Selic</div>
                    <input type="number" id="v-selic" placeholder="R$" oninput="salvarTudo()">
                    <input type="date" id="d-selic" oninput="salvarTudo()">
                    <input type="number" id="a-selic" placeholder="Aporte R$" oninput="salvarTudo()">
                    <div id="res-total-selic" class="text-right font-black mono res-preto text-sm">R$ 0,00</div>
                </div>
                <div class="invest-row">
                    <div class="h-full bg-cyan-400"></div>
                    <div class="font-bold">LCI / LCA</div>
                    <input type="number" id="v-lci" placeholder="R$" oninput="salvarTudo()">
                    <input type="date" id="d-lci" oninput="salvarTudo()">
                    <input type="number" id="a-lci" placeholder="Aporte R$" oninput="salvarTudo()">
                    <div id="res-total-lci" class="text-right font-black mono res-preto text-sm">R$ 0,00</div>
                </div>
                <div class="invest-row">
                    <div class="h-full bg-orange-400"></div>
                    <div class="font-bold">Poupança</div>
                    <input type="number" id="v-poup" placeholder="R$" oninput="salvarTudo()">
                    <input type="date" id="d-poup" oninput="salvarTudo()">
                    <input type="number" id="a-poup" placeholder="Aporte R$" oninput="salvarTudo()">
                    <div id="res-total-poup" class="text-right font-black mono res-preto text-sm">R$ 0,00</div>
                </div>

                <div class="invest-row">
                    <div class="h-full bg-emerald-600"></div>
                    <div class="font-bold">Dólar (USD) <span id="cot-usd" class="text-[9px] text-slate-400 mono block"></span></div>
                    <input type="number" id="v-usd" placeholder="US$" oninput="salvarTudo()">
                    <input type="date" id="d-usd" oninput="salvarTudo()">
                    <input type="number" id="a-usd" placeholder="Aporte US$" oninput="salvarTudo()">
                    <div id="res-total-usd" class="text-right font-black mono res-preto text-sm">R$ 0,00</div>
                </div>
                <div class="invest-row border-none">
                    <div class="h-full bg-blue-800"></div>
                    <div class="font-bold">Euro (EUR) <span id="cot-eur" class="text-[9px] text-slate-400 mono block"></span></div>
                    <input type="number" id="v-eur" placeholder="€" oninput="salvarTudo()">
                    <input type="date" id="d-eur" oninput="salvarTudo()">
                    <input type="number" id="a-eur" placeholder="Aporte €" oninput="salvarTudo()">
                    <div id="res-total-eur" class="text-right font-black mono res-preto text-sm">R$ 0,00</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let globalCDI = 10.75; 
        let taxaUSD = 0;
        let taxaEUR = 0;
        let totais = {};

        async function buscarDadosPublicos() {
            const display = document.getElementById('display-cdi');
            const dot = document.getElementById('status-dot');
            const label = document.getElementById('label-fonte');
            
            try {
                const r = await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.11/dados/ultimos/1?formato=json');
                const d = await r.json();
                if(d && d.length > 0) {
                    let taxaDiaria = parseFloat(d[0].valor);
                    let taxaAnual = (Math.pow(1 + (taxaDiaria/100), 252) - 1) * 100;
                    globalCDI = taxaAnual - 0.10; 
                    display.innerText = globalCDI.toFixed(2) + "%";
                    dot.className = "h-2 w-2 rounded-full bg-green-500 shrink-0";
                    label.innerText = "BANCO CENTRAL (ONLINE)";
                }
            } catch (e) {
                display.innerText = globalCDI.toFixed(2) + "%";
                dot.className = "h-2 w-2 rounded-full bg-orange-500 shrink-0";
                label.innerText = "BANCO CENTRAL (OFFLINE)";
            }

            try {
                const rCambio = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL,EUR-BRL');
                const dCambio = await rCambio.json();
                taxaUSD = parseFloat(dCambio.USDBRL.bid);
                taxaEUR = parseFloat(dCambio.EURBRL.bid);
                
                document.getElementById('top-usd').innerText = `R$ ${taxaUSD.toFixed(2)}`;
                document.getElementById('top-eur').innerText = `R$ ${taxaEUR.toFixed(2)}`;
                document.getElementById('cot-usd').innerText = `R$ ${taxaUSD.toFixed(2)}`;
                document.getElementById('cot-eur').innerText = `R$ ${taxaEUR.toFixed(2)}`;
            } catch (e) {
                taxaUSD = 5.00;
                taxaEUR = 5.40;
            }

            processarTudo();
        }

        function processarTudo() {
            totais = {};
            calcRF('master', globalCDI, 1.0); 
            calcRF('mapfre', globalCDI, 1.0);
            calcRF('prev', globalCDI, 0.95); 
            calcRF('selic', globalCDI + 0.1, 1.0);
            calcIsento('lci', globalCDI, 0.90); 
            calcPoup();
            calcMoedaCompleta('usd', taxaUSD);
            calcMoedaCompleta('eur', taxaEUR);

            const soma = Object.values(totais).reduce((a, b) => a + b, 0);
            document.getElementById('grand-total').innerText = soma.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        }

        function calcRF(id, cdi, bench) {
            const v = parseFloat(document.getElementById(`v-${id}`).value) || 0;
            const d = document.getElementById(`d-${id}`).value;
            const a = parseFloat(document.getElementById(`a-${id}`).value) || 0;
            if (v <= 0 || !d) { atualizarDisplay(id, 0); return; }
            const dias = Math.max(1, Math.ceil((new Date() - new Date(d)) / 86400000));
            const meses = dias / 30.44;
            const ir = dias > 720 ? 0.15 : dias > 360 ? 0.175 : dias > 180 ? 0.20 : 0.225;
            const txD = Math.pow(((cdi * bench) / 100) + 1, 1/252) - 1;
            const txM = Math.pow(((cdi * bench) / 100) + 1, 1/12) - 1;
            const rendPrincipal = (v * Math.pow(1 + txD, dias)) - v;
            const totalAportes = meses > 0 ? a * ((Math.pow(1 + txM, meses) - 1) / txM) : 0;
            const lucroAportes = totalAportes - (a * meses);
            const res = v + (rendPrincipal * (1 - ir)) + (a * meses) + (lucroAportes * (1 - ir));
            atualizarDisplay(id, res);
        }

        function calcIsento(id, cdi, bench) {
            const v = parseFloat(document.getElementById(`v-${id}`).value) || 0;
            const d = document.getElementById(`d-${id}`).value;
            const a = parseFloat(document.getElementById(`a-${id}`).value) || 0;
            if (v <= 0 || !d) { atualizarDisplay(id, 0); return; }
            const dias = Math.max(1, Math.ceil((new Date() - new Date(d)) / 86400000));
            const meses = dias / 30.44;
            const txD = Math.pow(((cdi * bench) / 100) + 1, 1/252) - 1;
            const txM = Math.pow(((cdi * bench) / 100) + 1, 1/12) - 1;
            const principalFinal = v * Math.pow(1 + txD, dias);
            const aportesFinal = meses > 0 ? a * ((Math.pow(1 + txM, meses) - 1) / txM) : 0;
            atualizarDisplay(id, principalFinal + aportesFinal);
        }

        function calcPoup() {
            const v = parseFloat(document.getElementById('v-poup').value) || 0;
            const d = document.getElementById('d-poup').value;
            const a = parseFloat(document.getElementById('a-poup').value) || 0;
            if (v <= 0 || !d) { atualizarDisplay('poup', 0); return; }
            const meses = (new Date() - new Date(d)) / 2628000000;
            let taxaPoup = globalCDI > 8.5 ? 0.005 : (globalCDI * 0.70 / 12 / 100);
            const principalFinal = v * Math.pow(1 + taxaPoup, meses);
            const aportesFinal = meses > 0 ? a * ((Math.pow(1 + taxaPoup, meses) - 1) / taxaPoup) : 0;
            atualizarDisplay('poup', principalFinal + aportesFinal);
        }

        function calcMoedaCompleta(id, taxa) {
            const v = parseFloat(document.getElementById(`v-${id}`).value) || 0;
            const d = document.getElementById(`d-${id}`).value;
            const a = parseFloat(document.getElementById(`a-${id}`).value) || 0;
            if (v <= 0) { atualizarDisplay(id, 0); return; }
            let totalMoeda = v;
            if (d) {
                const meses = Math.max(0, (new Date() - new Date(d)) / 2628000000);
                totalMoeda += (a * meses);
            }
            const resBRL = totalMoeda * taxa;
            atualizarDisplay(id, resBRL);
        }

        function atualizarDisplay(id, valor) {
            totais[id] = valor;
            document.getElementById(`res-total-${id}`).innerText = valor.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        }

        function salvarTudo() {
            const f = (id) => document.getElementById(id).value;
            const data = { 
                n: f('nome-investidor'), 
                vm: f('v-master'), dm: f('d-master'), am: f('a-master'),
                vmap: f('v-mapfre'), dmap: f('d-mapfre'), amap: f('a-mapfre'),
                vp: f('v-prev'), dp: f('d-prev'), ap: f('a-prev'),
                vs: f('v-selic'), ds: f('d-selic'), as: f('a-selic'),
                vl: f('v-lci'), dl: f('d-lci'), al: f('a-lci'),
                vpo: f('v-poup'), dpo: f('d-poup'), apo: f('a-poup'),
                v_usd: f('v-usd'), d_usd: f('d-usd'), a_usd: f('a-usd'),
                v_eur: f('v-eur'), d_eur: f('d-eur'), a_eur: f('a-eur')
            };
            localStorage.setItem('terminal_vTOTAL_FINAL', JSON.stringify(data));
            processarTudo();
        }

        window.onload = () => {
            carregarDados(JSON.parse(localStorage.getItem('terminal_vTOTAL_FINAL')));
            buscarDadosPublicos();
        };

        function carregarDados(s) {
            if(!s) return;
            document.getElementById('nome-investidor').value = s.n || "";
            const L = (id, val) => { if(document.getElementById(id)) document.getElementById(id).value = val || ""; };
            L('v-master', s.vm); L('d-master', s.dm); L('a-master', s.am);
            L('v-mapfre', s.vmap); L('d-mapfre', s.dmap); L('a-mapfre', s.amap);
            L('v-prev', s.vp); L('d-prev', s.dp); L('a-prev', s.ap);
            L('v-selic', s.vs); L('d-selic', s.ds); L('a-selic', s.as);
            L('v-lci', s.vl); L('d-lci', s.dl); L('a-lci', s.al);
            L('v-poup', s.vpo); L('d-poup', s.dpo); L('a-poup', s.apo);
            L('v-usd', s.v_usd); L('d-usd', s.d_usd); L('a-usd', s.a_usd);
            L('v-eur', s.v_eur); L('d-eur', s.d_eur); L('a-eur', s.a_eur);
            processarTudo();
        }

        function exportarDados() {
            const data = localStorage.getItem('terminal_vTOTAL_FINAL');
            if(!data) return;
            const agora = new Date();
            const dataFmt = agora.toLocaleDateString('pt-BR').replace(/\//g, '-');
            const horaFmt = agora.getHours() + 'h' + agora.getMinutes().toString().padStart(2, '0');
            const nomeArquivo = `Gestão_de_Investimentos_2026_${dataFmt}_${horaFmt}.json`;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], {type: "application/json"}));
            a.download = nomeArquivo;
            a.click();
        }

        function importarDados(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = JSON.parse(e.target.result);
                localStorage.setItem('terminal_vTOTAL_FINAL', JSON.stringify(data));
                carregarDados(data);
                alert("Dados importados com sucesso!");
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>

</template>

<script>
    function loadIframes() {
        const fluxoHTML = document.getElementById('ABA 1').innerHTML;
        const portfolioHTML = document.getElementById('ABA 2').innerHTML;
        document.getElementById('aba-fluxo').srcdoc = fluxoHTML;
        document.getElementById('aba-portfolio').srcdoc = portfolioHTML;
    }

    function openTab(evt, tabId) {
        document.querySelectorAll('iframe').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.tab-trigger').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    window.onload = loadIframes;
</script>
