<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Imóveis - Alberto</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --border-color: #cccccc;
            --tab-inactive: #e0e0e0;
        }

        body { font-family: Arial, sans-serif; background-color: var(--bg-body); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }

        /* ABAS ARRASTÁVEIS - AJUSTE DO CURSOR PARA SETINHA */
        .tabs-container { display: flex; gap: 5px; margin-bottom: -1px; flex-wrap: wrap; align-items: flex-end; }
        .tab { 
            padding: 10px 20px; background: var(--tab-inactive); border: 1px solid var(--border-color);
            border-bottom: none; border-radius: 5px 5px 0 0; 
            cursor: default !important; /* Aqui forcei a setinha padrão */
            font-size: 0.9rem;
            user-select: none; transition: 0.2s;
        }
        .tab:active { cursor: default !important; } /* Mantém a seta mesmo clicando */
        .tab.active { background: var(--bg-card); font-weight: bold; border-bottom: 2px solid white; z-index: 2; }
        .tab.dragging { opacity: 0.4; background: #fffde7; border: 1px dashed #999; }

        .btn-add-tab { padding: 8px 15px; background: #ddd; border: 1px solid var(--border-color); border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }

        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 0 5px 5px 5px; padding: 20px; margin-bottom: 20px; position: relative; z-index: 1; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .field { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.8rem; margin-bottom: 3px; color: #555; }
        input { border: 1px solid var(--border-color); padding: 8px; border-radius: 3px; font-size: 0.9rem; }

        /* BARRA FIXA */
        .toolbar {
    background: #f0f0f0; 
    padding: 10px; 
    border: 1px solid var(--border-color);
    display: flex; 
    gap: 10px; 
    flex-wrap: wrap; /* Permite a dobra */
    justify-content: center; /* Centraliza os botões */
    position: sticky; 
    top: 0; 
    z-index: 1000;
    width: 210mm; /* Mesma largura do papel */
    margin: 0 auto; 
    box-sizing: border-box;
}

        .divider { width: 1px; height: 20px; background: #ccc; margin: 0 5px; }

        /* EDITOR */
        #editor {
    width: 210mm; /* Largura padrão A4 */
    min-height: 297mm; /* Altura padrão A4 */
    padding: 20mm; /* Margens internas do contrato */
    margin: 10px auto; /* Centraliza a "folha" na tela */
    border: 1px solid #ddd;
    background: white;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12pt;
    line-height: 1.5;
    outline: none;
    box-sizing: border-box;
    text-align: justify;
}

.quebra-pagina {
    page-break-after: always;
    border-top: 2px dashed #2196F3; /* Linha tracejada azul */
    margin: 40px 0;
    position: relative;
    height: 20px; /* Damos uma alturinha para ela aparecer */
    cursor: default;
    user-select: none;
}

/* Este código abaixo escreve "QUEBRA DE PÁGINA" em cima da linha */
.quebra-pagina::before {
    content: "--- QUEBRA DE PÁGINA (NÃO SAI NA IMPRESSÃO) ---";
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    font-family: Arial, sans-serif;
    font-size: 10px;
    color: #2196F3;
    font-weight: bold;
}

@media print {
    .quebra-pagina {
        border: none !important;
        height: 0 !important;
        margin: 0 !important;
    }
    .quebra-pagina::before { content: ""; }
}
/* Garante que a linha azul não saia na impressora */
@media print {
    .quebra-pagina {
        border: none !important;
        margin: 0 !important;
    }
}

        /* LIXEIRA */
        .delete-footer { text-align: center; margin-top: 25px; margin-bottom: 15px; padding-top: 10px; border-top: 1px solid #eee;}
        .btn-trash { 
            background: none; border: none; cursor: pointer; font-size: 2rem; color: #ff0000 !important;
            transition: 0.2s; padding: 10px; line-height: 1;
        }
        .btn-trash:hover { transform: scale(1.2); }

        @media print {
            .no-print, .toolbar, .tabs-container, .delete-footer { display: none !important; }
            body { background: white; padding: 0; }
            .card { border: none; padding: 0; }
            #editor { border: none !important; padding: 0; }
            @page { margin: 2cm; }
        }

/* Ajuste da Barra de Simulação para alinhar com o A4 */
.simulador-container {
    background: #eee; 
    padding: 8px 20px; 
    border: 1px solid #ccc; 
    display: flex; 
    gap: 10px; 
    font-size: 13px; 
    align-items: center; 
    width: 210mm; /* Mesma largura da folha e da toolbar */
    margin: 0 auto; /* Centraliza na tela */
    box-sizing: border-box; /* Garante que o padding não aumente o tamanho */
}

/* Esconde a barra de simulação na hora de imprimir */
@media print {
    .simulador-container { display: none !important; }
}
    </style>
</head>
<body>

<div class="container">
    <div class="tabs-container no-print" id="tab-list"></div>

    <div class="card no-print">
        <div class="row">
            <div class="field"><label>Imóvel (Nome na Aba):</label><input type="text" id="in-imovel" oninput="updateCurrentData()"></div>
            <div class="field"><label>Cidade/Bairro:</label><input type="text" id="in-pref" oninput="updateCurrentData()"></div>
            <div class="field"><label>IPTU:</label><input type="text" id="in-iptu" oninput="updateCurrentData()"></div>
            <div class="field"><label>Matrícula:</label><input type="text" id="in-mat" oninput="updateCurrentData()"></div>
        </div>
    </div>

    <div class="toolbar no-print">
        <select onchange="document.execCommand('fontName', false, this.value)">
            <option value="Courier New">Courier</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Arial">Arial</option>            
        </select>
        <select onchange="changeFontSize(this.value)">
            <option value="10pt">10</option><option value="11pt">11</option>
            <option value="12pt" selected>12</option><option value="14pt">14</option>
            <option value="16pt">16</option>
        </select>

        <div class="divider"></div>      
        <button onclick="document.execCommand('bold')">B</button>
        <button onclick="document.execCommand('italic')">I</button>
        <button onclick="document.execCommand('underline')">U</button>

        <div class="divider"></div>
        <button onclick="document.execCommand('hiliteColor', false, 'yellow')" title="Marcar">🖍️</button>
        <button onclick="document.execCommand('hiliteColor', false, 'transparent')" title="Limpar">🧼</button>

        <div class="divider"></div>
        <button onclick="document.execCommand('foreColor', false, 'red')" title="Texto Vermelho" style="color: red;">A</button>
        <button onclick="document.execCommand('foreColor', false, 'blue')" title="Texto Azul" style="color: blue;">A</button>
        <button onclick="document.execCommand('foreColor', false, 'black')" title="Texto Preto" style="color: black;">A</button>
        
                    <div class="divider"></div>
        <button onclick="document.execCommand('justifyLeft')" title="Esquerda">⬅</button>
        <button onclick="document.execCommand('justifyCenter')" title="Centralizar">⬆</button>
        <button onclick="document.execCommand('justifyRight')" title="Direita">➡</button>
        <button onclick="document.execCommand('justifyFull')" title="Justificado">≡</button>

                    <div class="divider"></div>
                    <div style="flex-basis: 100%; height: 0;"></div>
                    <button onclick="insertDate()" title="Inserir Data">📅</button>
                    <div class="divider"></div>
                    <button onclick="clearAll()" title="Limpar Tudo">🗑️</button>
                    <div class="divider"></div>
                    <button onclick="copyToClipboard()" title="Copiar Conteúdo">📋</button>
                    <div class="divider"></div>
                    <button onclick="window.print()" title="Imprimir">🖨️</button>
                    <div class="divider"></div>
                    <button onclick="exportBackup()" title="Fazer Backup">💾</button>
                    <button onclick="document.getElementById('fileInput').click()" title="Importar Backup">📂</button>
                    <div class="divider"></div>
                    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Início da Página">⬆️</button>
                    <button onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})" title="Fim da Página">⬇️</button>
                    <button onclick="inserirQuebra()" title="Quebra de Página">✂️</button>
       
                    <input type="file" id="fileInput" style="display:none" onchange="importBackup(event)">
    </div>

<div class="simulador-container no-print">
    <span>Simular:</span>
    <input type="date" id="s-data" value="" style="padding:2px; border:1px solid #bbb; border-radius:3px;">
    <span>+</span>
    <input type="number" id="s-mes" value="1" style="width:40px; padding:2px; border:1px solid #bbb; border-radius:3px;"> 
    <span>meses</span>
    
    <button style="cursor:pointer; padding:5px 8px; background:white; border:1px solid #bbb; border-radius:3px; font-size:1.1rem;" 
            onclick="let d=new Date(document.getElementById('s-data').value+'T12:00:00'); d.setMonth(d.getMonth()+parseInt(document.getElementById('s-mes').value)); document.getElementById('s-res').innerText=d.toLocaleDateString('pt-BR');" 
            title="Calcular Data">🧮</button>
    
    <span id="s-res" style="font-family: 'Courier New', Courier, monospace; font-weight:bold; background:#fff; padding:2px 8px; border:1px solid #ccc; border-radius:3px;">---</span>

    <button onclick="deleteImovel()" title="Excluir Aba" style="background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 5px; margin-left: auto;">
        ❌
    </button>
</div>

    <div id="editor" contenteditable="true" oninput="updateCurrentData()"></div>

</div>

<script>
    let imoveis = [{ nome: 'Imóvel 1', pref: '', iptu: '', mat: '', contrato: '' }];
    let activeIndex = 0;
    let dragSrcIndex = null;

    function renderTabs() {
        const container = document.getElementById('tab-list');
        container.innerHTML = '';
        
        imoveis.forEach((imovel, index) => {
            const tab = document.createElement('div');
            tab.className = `tab ${index === activeIndex ? 'active' : ''}`;
            tab.innerText = imovel.nome || `Imóvel ${index + 1}`;
            tab.draggable = true;
            tab.dataset.index = index;

            tab.onclick = () => switchTab(index);
            tab.ondragstart = (e) => {
                dragSrcIndex = index;
                e.target.classList.add('dragging');
            };
            tab.ondragover = (e) => e.preventDefault();
            tab.ondrop = (e) => {
                const targetIndex = parseInt(tab.dataset.index);
                if (dragSrcIndex !== targetIndex) {
                    const item = imoveis.splice(dragSrcIndex, 1)[0];
                    imoveis.splice(targetIndex, 0, item);
                    activeIndex = targetIndex;
                    saveToStorage();
                    renderTabs();
                    loadCurrentData();
                }
            };
            tab.ondragend = (e) => e.target.classList.remove('dragging');
            container.appendChild(tab);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'btn-add-tab';
        addBtn.innerText = '+';
        addBtn.onclick = addImovel;
        container.appendChild(addBtn);
    }

    function switchTab(index) {
        activeIndex = index;
        loadCurrentData();
        renderTabs();
    }

    function addImovel() {
        imoveis.push({ nome: `Novo Imóvel`, pref: '', iptu: '', mat: '', contrato: '' });
        activeIndex = imoveis.length - 1;
        loadCurrentData();
        renderTabs();
        saveToStorage();
    }

    function deleteImovel() {
    if (imoveis.length === 1) return alert("Alberto, você precisa de pelo menos uma aba aberta!");
    
    if (confirm(`Tem certeza que deseja excluir a aba "${imoveis[activeIndex].nome}"?`)) {
        imoveis.splice(activeIndex, 1);
        
        // Se apagou a última aba, volta para a anterior. Se não, mantém o índice.
        if (activeIndex >= imoveis.length) {
            activeIndex = imoveis.length - 1;
        }
        
        renderTabs();
        loadCurrentData();
        saveToStorage();
    }
}

    function loadCurrentData() {
        const item = imoveis[activeIndex];
        document.getElementById('in-imovel').value = item.nome || '';
        document.getElementById('in-pref').value = item.pref || '';
        document.getElementById('in-iptu').value = item.iptu || '';
        document.getElementById('in-mat').value = item.mat || '';
        document.getElementById('editor').innerHTML = item.contrato || '';
    }

    function updateCurrentData() {
        imoveis[activeIndex].nome = document.getElementById('in-imovel').value;
        imoveis[activeIndex].pref = document.getElementById('in-pref').value;
        imoveis[activeIndex].iptu = document.getElementById('in-iptu').value;
        imoveis[activeIndex].mat = document.getElementById('in-mat').value;
        imoveis[activeIndex].contrato = document.getElementById('editor').innerHTML;
        renderTabs();
        saveToStorage();
    }

    function saveToStorage() {
        localStorage.setItem('alberto_multicontratos', JSON.stringify(imoveis));
    }

    window.onload = function() {
        const saved = localStorage.getItem('alberto_multicontratos');
        if (saved) imoveis = JSON.parse(saved);
        renderTabs();
        loadCurrentData();
    };

    async function copyToClipboard() {
    const editor = document.getElementById('editor');
    
    try {
        // Captura o HTML do editor para manter negritos, cores e fontes
        const type = "text/html";
        const blob = new Blob([editor.innerHTML], { type });
        const data = [new ClipboardItem({ [type]: blob, ["text/plain"]: new Blob([editor.innerText], {type: "text/plain"}) })];
        
        await navigator.clipboard.write(data);
        alert("Contrato copiado com formatação!");
    } catch (err) {
        // Caso o navegador bloqueie o método novo, tentamos o método clássico de seleção
        const range = document.createRange();
        range.selectNode(editor);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        
        try {
            document.execCommand('copy');
            alert("Contrato copiado!");
        } catch (e) {
            alert("Erro ao copiar. Por favor, selecione o texto e use Ctrl+C.");
        }
        window.getSelection().removeAllRanges();
    }
}

    function exportBackup() {
        const agora = new Date();
        const ano = agora.getFullYear();
        const dataF = String(agora.getDate()).padStart(2, '0') + "-" + String(agora.getMonth() + 1).padStart(2, '0') + "-" + ano;
        const horaF = String(agora.getHours()).padStart(2, '0') + "h" + String(agora.getMinutes()).padStart(2, '0');
        const nomeArquivo = `backup_contratos_aluguel_${ano}_${dataF}_${horaF}.json`;
        const blob = new Blob([JSON.stringify(imoveis)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = nomeArquivo; a.click();
    }

    function importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            imoveis = JSON.parse(e.target.result);
            activeIndex = 0;
            saveToStorage();
            location.reload();
        };
        reader.readAsText(file);
    }

    function changeFontSize(size) {
        document.execCommand('fontSize', false, '7');
        const fontSpans = document.getElementsByTagName("font");
        for (let i = 0; i < fontSpans.length; i++) {
            if (fontSpans[i].size == "7") {
                fontSpans[i].removeAttribute("size");
                fontSpans[i].style.fontSize = size;
            }
        }
        updateCurrentData();
    }

    function insertDate() {
        const d = new Date();
        const dataF = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        document.execCommand('insertText', false, "São Paulo, " + dataF);
        updateCurrentData();
    }

    function clearAll() {
        if(confirm("Limpar o texto?")) {
            document.getElementById('editor').innerHTML = '';
            updateCurrentData();
        }
    }


	// Ajuste final: Mantém largura total, parágrafos, Negrito e Cores
document.getElementById('editor').addEventListener('paste', function(e) {
    e.preventDefault();
    
    let html = (e.originalEvent || e).clipboardData.getData('text/html');

    if (html) {
        let div = document.createElement('div');
        div.innerHTML = html;

        let todos = div.querySelectorAll('*');
        todos.forEach(el => {
            // REMOVE a "página colada" (bordas e sombras)
            el.style.border = 'none';
            el.style.boxShadow = 'none';
            el.style.background = 'transparent';
            
            // FORÇA a largura total para não ficar estreito
            el.style.width = '100%';
            el.style.maxWidth = '100%';
            el.style.boxSizing = 'border-box';

            // TRATA OS PARÁGRAFOS (como o Item 1 e Item 2 do Word)
            if (['P', 'DIV', 'LI'].includes(el.tagName)) {
                el.style.display = 'block';
                el.style.margin = '0 0 15px 0'; // Espaço de 15px entre os itens
                el.style.padding = '0';
            }
        });

        // Insere o conteúdo que agora respeita a largura da sua folha
        document.execCommand('insertHTML', false, div.innerHTML);
    } else {
        const text = (e.originalEvent || e).clipboardData.getData('text/plain');
        document.execCommand('insertText', false, text);
    }

    // Garante a fonte Courier New e salva
    document.execCommand('fontName', false, 'Courier New');
    updateCurrentData();
});

function inserirQuebra() {
    const div = document.createElement('div');
    div.className = 'quebra-pagina';
    div.contentEditable = false; 

    const selection = window.getSelection();
    if (selection.rangeCount > 0) {
        const range = selection.getRangeAt(0);
        range.insertNode(div);
        // Cria um espaço depois da quebra para continuar digitando
        const br = document.createElement('br');
        div.after(br);

        // Move o cursor para depois da quebra
        range.setStartAfter(br);
        range.setEndAfter(br);
    }
    updateCurrentData();
}
</script>

</body>
</html>
