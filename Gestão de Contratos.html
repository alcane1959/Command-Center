<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Contratos Imobiliários</title>
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --border-color: #cccccc;
            --tab-inactive: #e0e0e0;
        }

        body { font-family: Arial, sans-serif; background-color: var(--bg-body); margin: 0; padding: 20px; zoom: 100%;}
        .container { max-width: 1000px; margin: auto; }

        .tabs-container { display: flex; gap: 5px; margin-bottom: -1px; flex-wrap: wrap; align-items: flex-end; }
        .tab { 
            padding: 10px 20px; background: var(--tab-inactive); border: 1px solid var(--border-color);
            border-bottom: none; border-radius: 5px 5px 0 0; 
            cursor: default !important; font-size: 0.9rem;
            user-select: none; transition: 0.2s;
        }
        .tab.active { background: var(--bg-card); font-weight: bold; border-bottom: 2px solid white; z-index: 2; }
        .tab.dragging { opacity: 0.4; background: #fffde7; border: 1px dashed #999; }

        .btn-add-tab { padding: 8px 15px; background: #ddd; border: 1px solid var(--border-color); border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }

        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 0 5px 5px 5px; padding: 20px; margin-bottom: 20px; position: relative; z-index: 1; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .field { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.8rem; margin-bottom: 3px; color: #555; }
        input { border: 1px solid var(--border-color); padding: 8px; border-radius: 3px; font-size: 0.9rem; }

        .toolbar {
    	background: #f0f0f0; padding: 10px; border: 1px solid var(--border-color);
    	display: flex; gap: 10px; flex-wrap: wrap; 
 	justify-content: flex-start; 
   	position: sticky; top: 0; z-index: 1000; width: 210mm; margin: 0 auto; box-sizing: border-box;
       }

        .divider { width: 1px; height: 20px; background: #ccc; margin: 0 5px; }

        #editor {
            width: 210mm; min-height: 297mm; padding: 20mm; margin: 10px auto; 
            border: 1px solid #ddd; background: white;
            font-family: 'Courier New', Courier, monospace; font-size: 12pt;
            line-height: 1.5; outline: none; box-sizing: border-box; text-align: justify;
        }

        .quebra-pagina {
            page-break-after: always; border-top: 2px dashed #2196F3;
            margin: 40px 0; position: relative; height: 20px; cursor: default; user-select: none;
        }

        .quebra-pagina::before {
            content: "--- QUEBRA DE PÁGINA (NÃO SAI NA IMPRESSÃO) ---";
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            font-family: Arial, sans-serif; font-size: 10px; color: #2196F3; font-weight: bold;
        }

        .busca-container {
            background: #eef2ff; padding: 8px 20px; border: 1px solid #c7d2fe; 
            display: flex; gap: 10px; font-size: 13px; align-items: center; 
            width: 210mm; margin: 0 auto 5px auto; box-sizing: border-box;
        }

        @media print {
            .no-print, .toolbar, .tabs-container, .delete-footer, .simulador-container, .busca-container { display: none !important; }
            body { background: white; padding: 0; }
            .card { border: none; padding: 0; }
            #editor { border: none !important; padding: 0; }
            @page { margin: 2cm; }
            .quebra-pagina { border: none !important; height: 0 !important; margin: 0 !important; }
            .quebra-pagina::before { content: ""; }
        }

        .simulador-container {
            background: #eee; padding: 8px 20px; border: 1px solid #ccc; 
            display: flex; gap: 10px; font-size: 13px; align-items: center; 
            width: 210mm; margin: 0 auto; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs-container no-print" id="tab-list"></div>

    <div class="card no-print">
        <div class="row">
            <div class="field"><label>Imóvel (Nome na Aba):</label><input type="text" id="in-imovel" oninput="updateCurrentData()"></div>
            <div class="field"><label>Cidade/Bairro:</label><input type="text" id="in-pref" oninput="updateCurrentData()"></div>
            <div class="field"><label>IPTU:</label><input type="text" id="in-iptu" oninput="updateCurrentData()"></div>
            <div class="field"><label>Matrícula:</label><input type="text" id="in-mat" oninput="updateCurrentData()"></div>
        </div>
    </div>

    <div class="toolbar no-print">
        <select onchange="document.execCommand('fontName', false, this.value)">
            <option value="Courier New">Courier</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Arial">Arial</option>            
        </select>
        <select onchange="changeFontSize(this.value)">
            <option value="10pt">10</option><option value="11pt">11</option>
            <option value="12pt" selected>12</option><option value="14pt">14</option>
            <option value="16pt">16</option>
        </select>

        <select id="lineHeightSelect" onchange="changeLineHeight(this.value)" title="Espaçamento (Múltiplos de 0.15)">
            <option value="0.70">0</option>
            <option value="0.80">0.10</option>
            <option value="0.90">0.20</option>
            <option value="1.00">0.30</option>
            <option value="1.10">0.40</option>
            <option value="1.20">0.50</option>
            <option value="1.30">0.60</option>
            <option value="1.40">0.70</option>
            <option value="1.50">0.80</option>
            <option value="1.60">0.90</option>
            <option value="1.70">1.00</option>
            <option value="1.80">1.10</option>
            <option value="1.90">1.20</option>
            <option value="2.00">1.30</option>
        </select>

        <span title="Recuo do Parágrafo" style="font-size: 12px;">↹</span>
        <select onchange="ajustarRecuo(this.value)" title="Recuo do Parágrafo (cm)">
            <option value="0" selected>0</option>
    	    <option value="0.25cm">0.25</option>
  	    <option value="0.50cm">0.50</option>
    	    <option value="0.75cm">0.75</option>
   	    <option value="1cm">1.0 </option>
   	    <option value="1.25cm">1.25 </option>
   	    <option value="1.50cm">1.50</option>
   	    <option value="1.75cm">1.75</option>
   	    <option value="2cm">2.0</option>
    	    <option value="2.25cm">2.25</option>
   	    <option value="2.50cm">2.50</option>
    	    <option value="2.75cm">2.75</option>
    	    <option value="3cm">3.0</option>
        </select>
      
        <button onclick="document.execCommand('bold')">B</button>
        <button onclick="document.execCommand('italic')">I</button>
        <button onclick="document.execCommand('underline')">U</button>

        <button onclick="document.execCommand('hiliteColor', false, 'yellow')" title="Marcar">🖍️</button>
        <button onclick="document.execCommand('hiliteColor', false, 'transparent')" title="Limpar">🧼</button>

        <button onclick="document.execCommand('foreColor', false, 'red')" title="Texto Vermelho" style="color: red;">A</button>
        <button onclick="document.execCommand('foreColor', false, 'blue')" title="Texto Azul" style="color: blue;">A</button>
        <button onclick="document.execCommand('foreColor', false, 'black')" title="Texto Preto" style="color: black;">A</button>
        
        <button onclick="document.execCommand('justifyLeft')" title="Esquerda">⬅</button>
        <button onclick="document.execCommand('justifyCenter')" title="Centralizar">⬆</button>
        <button onclick="document.execCommand('justifyRight')" title="Direita">➡</button>
        <button onclick="document.execCommand('justifyFull')" title="Justificado">≡</button>

        <div style="flex-basis: 100%; height: 0;"></div>
        <button onclick="insertDate()" title="Inserir Data">📅</button>
        <button onclick="clearAll()" title="Limpar Tudo">🗑️</button>
        <button onclick="copyToClipboard()" title="Copiar Conteúdo">📋</button>
        <button onclick="window.print()" title="Imprimir">🖨️</button>
        <button onclick="exportBackup()" title="Fazer Backup">💾</button>
        <button onclick="document.getElementById('fileInput').click()" title="Importar Backup">📂</button>
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Início da Página">⬆️</button>
        <button onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})" title="Fim da Página">⬇️</button>
        <button onclick="inserirQuebra()" title="Quebra de Página">✂️</button>

	<div class="divider"></div>
	<span style="font-size: 13px; margin-left: 5px;">🔍</span>
	<input type="text" id="busca-texto" placeholder="Localizar..." style="width: 239px; padding: 4px; border: 1px solid #ccc; border-radius: 3px;">
	<button type="button" id="btn-next" onclick="buscarNoTexto()" style="cursor:pointer; padding: 4px 10px;" title="Procurar Próximo">Next</button>
       
        <input type="file" id="fileInput" style="display:none" onchange="importBackup(event)">
    </div>

    	<div class="simulador-container no-print" style="display: flex; align-items: center; gap: 15px;">
    	<span style="font-family: 'Courier New', Courier, monospace; font-weight: normal; font-size: 1rem;">Simular:</span>
       	<input type="date" id="s-data" value="" 
        style="font-family: 'Courier New', Courier, monospace; font-size: 1rem; font-weight: normal; padding: 2px; border: 1px solid #bbb; border-radius: 3px;">    
    	<span>+</span>
       	<input type="number" id="s-mes" value="0" 
        style="font-family: 'Courier New', Courier, monospace; font-size: 1rem;  width: 45px; padding: 2px; border: 1px solid #bbb; border-radius: 3px;"> 
       	<span style="font-family: 'Courier New', Courier, monospace; font-size: 1rem;">meses</span>
    	<button style="cursor:pointer; padding:5px 8px; background:white; border:1px solid #bbb; border-radius:3px; font-size:1.1rem;" 
        onclick="let d=new Date(document.getElementById('s-data').value+'T12:00:00'); 
	d.setMonth(d.getMonth()+parseInt(document.getElementById('s-mes').value)); document.getElementById('s-res').innerText=d.toLocaleDateString('pt-BR');" 
        title="Calcular Data">🧮</button>
    	<span id="s-res" style="font-family: 'Courier New', Courier, monospace; font-size: 1rem; font-weight:normal; background:#fff; padding:4px 10px; border:1px solid #ccc; border-radius:3px;">---</span>

    	<button onclick="deleteImovel()" title="Excluir Aba" style="background-color: none; color: white; font-weight: normal; border: none; cursor: pointer; font-size: 1rem; padding: 5px 10px; margin-left: auto; border-radius: 5px; color: red;">Excluir Aba</button><span style="font-size: 20px;">⚠️</span>
</div>

    <div id="editor" contenteditable="true" oninput="updateCurrentData()"></div>
</div>

<script>
    let imoveis = [{ nome: 'Imóvel 1', pref: '', iptu: '', mat: '', contrato: '' }];
    let activeIndex = 0;
    let dragSrcIndex = null;

    function renderTabs() {
        const container = document.getElementById('tab-list');
        container.innerHTML = '';
        imoveis.forEach((imovel, index) => {
            const tab = document.createElement('div');
            tab.className = `tab ${index === activeIndex ? 'active' : ''}`;
            tab.innerText = imovel.nome || `Imóvel ${index + 1}`;
            tab.draggable = true;
            tab.dataset.index = index;
            tab.onclick = () => switchTab(index);
            tab.ondragstart = (e) => { dragSrcIndex = index; e.target.classList.add('dragging'); };
            tab.ondragover = (e) => e.preventDefault();
            tab.ondrop = (e) => {
                const targetIndex = parseInt(tab.dataset.index);
                if (dragSrcIndex !== targetIndex) {
                    const item = imoveis.splice(dragSrcIndex, 1)[0];
                    imoveis.splice(targetIndex, 0, item);
                    activeIndex = targetIndex;
                    saveToStorage(); renderTabs(); loadCurrentData();
                }
            };
            tab.ondragend = (e) => e.target.classList.remove('dragging');
            container.appendChild(tab);
        });
        const addBtn = document.createElement('button');
        addBtn.className = 'btn-add-tab';
        addBtn.innerText = '+';
        addBtn.onclick = addImovel;
        container.appendChild(addBtn);
    }

    function switchTab(index) { activeIndex = index; loadCurrentData(); renderTabs(); }
    function addImovel() {
        imoveis.push({ nome: `Novo Imóvel`, pref: '', iptu: '', mat: '', contrato: '' });
        activeIndex = imoveis.length - 1;
        loadCurrentData(); renderTabs(); saveToStorage();
    }

    function deleteImovel() {
        if (imoveis.length === 1) return alert("Alberto, você precisa de pelo menos uma aba aberta!");
        if (confirm(`Excluir a aba "${imoveis[activeIndex].nome}"?`)) {
            imoveis.splice(activeIndex, 1);
            if (activeIndex >= imoveis.length) activeIndex = imoveis.length - 1;
            renderTabs(); loadCurrentData(); saveToStorage();
        }
    }

    function loadCurrentData() {
        const item = imoveis[activeIndex];
        document.getElementById('in-imovel').value = item.nome || '';
        document.getElementById('in-pref').value = item.pref || '';
        document.getElementById('in-iptu').value = item.iptu || '';
        document.getElementById('in-mat').value = item.mat || '';
        document.getElementById('editor').innerHTML = item.contrato || '';
    }

    function updateCurrentData() {
        imoveis[activeIndex].nome = document.getElementById('in-imovel').value;
        imoveis[activeIndex].pref = document.getElementById('in-pref').value;
        imoveis[activeIndex].iptu = document.getElementById('in-iptu').value;
        imoveis[activeIndex].mat = document.getElementById('in-mat').value;
        imoveis[activeIndex].contrato = document.getElementById('editor').innerHTML;
        renderTabs(); saveToStorage();
    }

    function saveToStorage() { localStorage.setItem('alberto_multicontratos', JSON.stringify(imoveis)); }

    window.onload = function() {
        const saved = localStorage.getItem('alberto_multicontratos');
        if (saved) imoveis = JSON.parse(saved);
        renderTabs(); loadCurrentData();
    };

    async function copyToClipboard() {
        const editor = document.getElementById('editor');
        try {
            const type = "text/html";
            const blob = new Blob([editor.innerHTML], { type });
            const data = [new ClipboardItem({ [type]: blob, ["text/plain"]: new Blob([editor.innerText], {type: "text/plain"}) })];
            await navigator.clipboard.write(data);
            alert("Contrato copiado!");
        } catch (err) { alert("Erro ao copiar."); }
    }

    function exportBackup() {
        const agora = new Date();
        const ano = agora.getFullYear(); 
        const dia = String(agora.getDate()).padStart(2, '0');
        const mes = String(agora.getMonth() + 1).padStart(2, '0');
        const dataCompleta = `${dia}-${mes}-${ano}`;
        const horas = String(agora.getHours()).padStart(2, '0');
        const minutos = String(agora.getMinutes()).padStart(2, '0');
        const segundos = String(agora.getSeconds()).padStart(2, '0');
        const horario = `${horas}-${minutos}-${segundos}`;

        const nomeArquivo = `Gestão_de_Contratos_${ano}_${dataCompleta}_${horario}.json`;
        
        const blob = new Blob([JSON.stringify(imoveis)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); 
        a.download = nomeArquivo; 
        a.click();
    }

    function importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            imoveis = JSON.parse(e.target.result); activeIndex = 0;
            saveToStorage(); location.reload();
        };
        reader.readAsText(file);
    }

    function changeFontSize(size) {
        document.execCommand('fontSize', false, '7');
        const fontSpans = document.getElementsByTagName("font");
        for (let i = 0; i < fontSpans.length; i++) {
            if (fontSpans[i].size == "7") {
                fontSpans[i].removeAttribute("size");
                fontSpans[i].style.fontSize = size;
            }
        }
        updateCurrentData();
    }

    function changeLineHeight(spacing) {
        const selection = window.getSelection();
        if (!selection.rangeCount || selection.isCollapsed) return;

        document.execCommand('foreColor', false, '#000004');
        const marks = document.querySelectorAll('font[color="#000004"]');
        
        marks.forEach(mark => {
            mark.removeAttribute('color');
            mark.style.color = 'black';
            
            let block = mark.parentElement;
            while (block && block.id !== 'editor' && !['P', 'DIV', 'LI'].includes(block.tagName)) {
                block = block.parentElement;
            }

            if (block && block.id !== 'editor') {
                block.style.lineHeight = spacing;
                block.style.margin = "0px 0px 5px 0px"; 
                block.style.padding = "0px";
            } else {
                const div = document.createElement('div');
                div.style.lineHeight = spacing;
                div.style.display = 'block';
                div.style.margin = "0px 0px 5px 0px";
                mark.parentNode.insertBefore(div, mark);
                div.appendChild(mark);
            }
        });
        updateCurrentData();
    }

    function insertDate() {
        const d = new Date();
        const dataF = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        document.execCommand('insertText', false, "São Paulo, " + dataF);
        updateCurrentData();
    }

    function clearAll() { if(confirm("Limpar o texto?")) { document.getElementById('editor').innerHTML = ''; updateCurrentData(); } }

    document.getElementById('editor').addEventListener('paste', function(e) {
        e.preventDefault();
        let html = (e.originalEvent || e).clipboardData.getData('text/html');
        if (html) {
            let div = document.createElement('div');
            div.innerHTML = html;
            div.querySelectorAll('*').forEach(el => {
                el.style.border = 'none'; el.style.boxShadow = 'none'; el.style.background = 'transparent';
                el.style.width = '100%'; el.style.maxWidth = '100%'; el.style.boxSizing = 'border-box';
                if (['P', 'DIV', 'LI'].includes(el.tagName)) { el.style.display = 'block'; el.style.margin = '0 0 10px 0'; el.style.padding = '0'; }
            });
            document.execCommand('insertHTML', false, div.innerHTML);
        } else {
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
        }
        document.execCommand('fontName', false, 'Courier New');
        updateCurrentData();
    });

    function inserirQuebra() {
        const div = document.createElement('div');
        div.className = 'quebra-pagina'; div.contentEditable = false; 
        const selection = window.getSelection();
        if (selection.rangeCount > 0) {
            const range = selection.getRangeAt(0);
            range.insertNode(div);
            const br = document.createElement('br'); div.after(br);
            range.setStartAfter(br); range.setEndAfter(br);
        }
        updateCurrentData();
    }

    function buscarNoTexto() {
        const termo = document.getElementById('busca-texto').value;
        if (!termo) return;
        
        // window.find retorna true se achar, e seleciona o texto automaticamente
        if (!window.find(termo, false, false, true, false, true, false)) {
            // Se não achar mais nada, volta pro topo
            window.getSelection().removeAllRanges();
            window.find(termo, false, false, true, false, true, false);
        }
    }

    // INTERCEPTADOR DE ENTER GLOBAL (Para não precisar focar na busca)
    document.addEventListener('keydown', function (e) {
        const campoBusca = document.getElementById('busca-texto');
        
        // Se a tecla for ENTER e o campo de busca tiver algum texto
        if (e.key === 'Enter' && campoBusca.value.trim() !== "") {
            e.preventDefault(); // Impede o pulo de linha no editor
            buscarNoTexto();    // Executa a busca
        }
    });

    function ajustarRecuo(valor) {
        document.execCommand('formatBlock', false, 'div');
        const selection = window.getSelection();
        if (selection.rangeCount > 0) {
            let range = selection.getRangeAt(0);
            let node = range.commonAncestorContainer;
            if (node.nodeType === 3) node = node.parentNode;
            
            while (node && node.id !== 'editor' && !['DIV', 'P'].includes(node.tagName)) {
                node = node.parentNode;
            }
            if (node && node.id !== 'editor') {
                node.style.textIndent = valor;
            }
        }
        updateCurrentData();
    }
</script>
</body>
</html>
